name: React Coverage Quality Gate

on:
  pull_request:
    branches: [ prod ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      # 1️⃣ Direct Binary Download (Avoids 403 and interactive prompts)
      - name: Install LiveReview CLI
        run: |
          mkdir -p $GITHUB_WORKSPACE/bin
          # Downloading the specific linux-amd64 binary directly
          wget -O $GITHUB_WORKSPACE/bin/lrc https://github.com/HexmosTech/Installerpedia/releases/latest/download/lrc-linux-amd64
          chmod +x $GITHUB_WORKSPACE/bin/lrc
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH

      # 2️⃣ Run Review using the Binary
      - name: Run LiveReview AI Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Ensure we are comparing against the target branch
          git fetch origin prod
          git diff origin/prod > diff.txt
          
          echo "================ AI REVIEW START ================"
          # Run the review. Note: Ensure the CLI flags match your version
          lrc review --diff diff.txt --api-key $GEMINI_API_KEY > review_result.txt
          
          cat review_result.txt
          
          if grep -iqE "error|critical" review_result.txt; then
            echo "❌ AI Review found critical issues."
            exit 1
          fi

      # 3️⃣ Unit Tests & Coverage
      - name: Run unit tests
        # Added --json-summary reporter explicitly to ensure the file is created
        run: npm test -- --coverage --watchAll=false --coverageReporters="json-summary"

      # 4️⃣ Enforce 80% Coverage Gate
      - name: Enforce Coverage Gate (80%)
        run: |
          SUMMARY="./coverage/coverage-summary.json"
          if [ -f "$SUMMARY" ]; then
            node -e "
              const summary = require('$SUMMARY');
              const pct = summary.total.lines.pct;
              console.log('📊 Current Coverage: ' + pct + '%');
              if (pct < 80) {
                console.error('❌ Coverage is below 80%!');
                process.exit(1);
              }
            "
          else
            echo "❌ coverage-summary.json not found! Check your Jest config."
            exit 1
          fi
