name: React Unit Tests with Allure

on:
  pull_request:
    branches: [ prod ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Checkout the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Run Jest unit tests with coverage + Allure results
      - name: Run unit tests
        run: npm test -- --coverage --alluredir=allure-results

      # Install Allure commandline
      - name: Install Allure CLI
        run: npm install -g allure-commandline

      # Generate Allure HTML report
      - name: Generate Allure Report
        run: allure generate allure-results --clean -o allure-report

      # Publish Allure report directly in PR checks summary
      - name: Publish Allure Report
        uses: simple-elf/allure-report-action@v1.6
        with:
          allure_results: allure-results
          allure_report: allure-report
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # Upload coverage report as artifact (optional)
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
