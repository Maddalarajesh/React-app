name: React Unit Tests with Coverage

on:
  pull_request:
    branches: [ prod ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Run tests with coverage
      - name: Run unit tests
        run: npm test -- --coverage

      # Extract coverage % and show in summary
      - name: Extract Coverage %
        run: |
          COVERAGE=$(node -e "console.log(require('./coverage/coverage-summary.json').total.lines.pct)")
          echo "### ✅ Test Coverage: ${COVERAGE}%" >> $GITHUB_STEP_SUMMARY

      # Upload HTML coverage report
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov-report

      # Optional: Comment coverage on PR
      - name: Comment Coverage on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            📊 Test Coverage:
            $(node -e "console.log(require('./coverage/coverage-summary.json').total.lines.pct + '%')")
