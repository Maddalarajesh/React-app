name: React Coverage Quality Gate

on:
  pull_request:
    branches: [ prod ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Quick demo setup for LiveReview CLI
      - name: Install LiveReview Demo
        run: |
          curl -fsSL https://raw.githubusercontent.com/HexmosTech/LiveReview/main/lrops.sh | \
          sudo bash -s -- setup-demo --force
      - name: Run LiveReview AI review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: git lrc review --diff

      # 6️⃣ Run unit tests with coverage
      - name: Run unit tests
        run: npm test -- --coverage

      # 7️⃣ Extract and display coverage %
      - name: Show Coverage %
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE=$(node -e "console.log(require('./coverage/coverage-summary.json').total.lines.pct)")
            echo "Coverage: $COVERAGE%"
            echo "### ✅ Test Coverage: ${COVERAGE}%" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ coverage-summary.json not found"
            exit 1
          fi

      # 8️⃣ Upload HTML coverage report as artifact
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov-report
