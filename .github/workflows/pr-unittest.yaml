name: React Coverage Quality Gate

on:
  pull_request:
    branches: [ prod ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # Install dependencies
      - name: Install dependencies
        run: npm ci
      - name: Install LiveReview
        run: npm install -g github:hexmos/livereview  

      # ✅ Install LiveReview
      # - name: Install LiveReview
      #   run: |
      #     git clone https://github.com/hexmos/livereview.git
      #     cd livereview
      #     npm install
      #     npm link

      # ✅ Run LiveReview on PR diff
      - name: Run LiveReview (AI Code Review)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "🔍 Running LiveReview on PR changes..."
          livereview review --diff

      # Run tests with coverage
      - name: Run unit tests
        run: npm test -- --coverage

      # Extract and display coverage %
      - name: Show Coverage %
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE=$(node -e "console.log(require('./coverage/coverage-summary.json').total.lines.pct)")
            echo "Coverage: $COVERAGE%"
            echo "### ✅ Test Coverage: ${COVERAGE}%" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ coverage-summary.json not found"
            exit 1
          fi

      # Upload HTML coverage report
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov-report
