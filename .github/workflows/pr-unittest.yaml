name: React Coverage Quality Gate

on:
  pull_request:
    branches: [ prod ]

jobs:
  test:
    runs-on: ubuntu-latest
    # Added explicit permissions for the default GITHUB_TOKEN
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use the built-in token instead of a manual PAT to avoid 'repo not exists'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 1️⃣ INSTALL WITHOUT SUDO: Install the CLI locally to the runner
      - name: Install LiveReview CLI
        run: |
          mkdir -p bin
          curl -fsSL https://hexmos.com/lrc-install.sh | bash -s -- --install-dir ./bin
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH
          # Force execute permissions just in case
          chmod +x ./bin/lrc || true

      # 2️⃣ RUN REVIEW: Use the local binary
      - name: Run LiveReview AI Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          git diff origin/prod > diff.txt
          
          # Check if the binary exists and run it
          if [ -f "./bin/lrc" ]; then
            ./bin/lrc review --diff diff.txt --api-key $GEMINI_API_KEY > review_result.txt
          else
            # Fallback to npx if binary install failed
            npx @hexmos/ipm i livereview
            npx lrc review --diff diff.txt --api-key $GEMINI_API_KEY > review_result.txt
          fi
          
          cat review_result.txt
          if grep -iqE "error|critical" review_result.txt; then
            echo "❌ AI Review found critical issues."
            exit 1
          fi

      # 3️⃣ TESTS & COVERAGE
      - name: Run unit tests
        run: npm test -- --coverage --watchAll=false --coverageReporters="json-summary"

      - name: Enforce Coverage Gate (80%)
        run: |
          SUMMARY="./coverage/coverage-summary.json"
          if [ -f "$SUMMARY" ]; then
            node -e "
              const summary = require('$SUMMARY');
              const pct = summary.total.lines.pct;
              console.log('📊 Coverage: ' + pct + '%');
              if (pct < 80) process.exit(1);
            "
          else
            echo "❌ No coverage summary found."
            exit 1
          fi
