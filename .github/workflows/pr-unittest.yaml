name: React Coverage Quality Gate

on:
  pull_request:
    branches: [ prod ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      # 1️⃣ Generate the diff and run AI Review via a simple Node script
      - name: AI Code Review (Direct via Gemini)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          git fetch origin prod
          git diff origin/prod > diff.txt
          
          # We'll use a small Node script to send this to Gemini
          node -e "
          const https = require('https');
          const fs = require('fs');
          const diff = fs.readFileSync('diff.txt', 'utf8');

          if (!diff.trim()) {
            console.log('✅ No changes detected.');
            process.exit(0);
          }

          const data = JSON.stringify({
            contents: [{
              parts: [{ text: 'Review this git diff for bugs or security issues. If it looks good, say OK. If there are issues, start your response with ERROR: \n\n' + diff }]
            }]
          });

          const options = {
            hostname: 'generativelanguage.googleapis.com',
            path: '/v1beta/models/gemini-1.5-flash:generateContent?key=' + process.env.GEMINI_API_KEY,
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
          };

          const req = https.request(options, (res) => {
            let body = '';
            res.on('data', (d) => body += d);
            res.on('end', () => {
              const response = JSON.parse(body);
              const text = response.candidates[0].content.parts[0].text;
              console.log('--- AI REVIEW RESULT ---');
              console.log(text);
              if (text.includes('ERROR')) {
                console.error('❌ AI detected issues!');
                process.exit(1);
              }
            });
          });

          req.on('error', (e) => { console.error(e); process.exit(1); });
          req.write(data);
          req.end();
          "

      # 2️⃣ Run unit tests
      - name: Run unit tests
        run: npm test -- --coverage --watchAll=false --coverageReporters="json-summary"

      # 3️⃣ Enforce 80% Coverage Gate
      - name: Enforce Coverage Gate (80%)
        run: |
          SUMMARY="./coverage/coverage-summary.json"
          if [ -f "$SUMMARY" ]; then
            node -e "
              const summary = require('$SUMMARY');
              const pct = summary.total.lines.pct;
              console.log('📊 Current Coverage: ' + pct + '%');
              if (pct < 80) {
                console.error('❌ Coverage is below 80%!');
                process.exit(1);
              }
            "
          else
            echo "❌ coverage-summary.json not found! Check your Jest config."
            exit 1
          fi
