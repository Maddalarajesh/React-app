name: React Coverage Quality Gate

on:
  pull_request:
    branches: [ prod ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      # 1️⃣ THE OFFICIAL LIVEREVIEW ACTION
      # This replaces all the 'curl', 'wget', and 'docker' steps.
      - name: LiveReview AI Code Review
        uses: HexmosTech/LiveReview@main
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          # This automatically compares the PR branch to the base branch (prod)
          base_branch: 'prod'

      # 2️⃣ Run unit tests
      # We ensure 'json-summary' is generated for the next step.
      - name: Run unit tests
        run: npm test -- --coverage --watchAll=false --coverageReporters="json-summary"

      # 3️⃣ Enforce 80% Coverage Gate
      - name: Enforce Coverage Gate (80%)
        run: |
          SUMMARY="./coverage/coverage-summary.json"
          if [ -f "$SUMMARY" ]; then
            node -e "
              const summary = require('$SUMMARY');
              const pct = summary.total.lines.pct;
              console.log('📊 Current Coverage: ' + pct + '%');
              if (pct < 80) {
                console.error('❌ Coverage is below the 80% threshold!');
                process.exit(1);
              }
            "
          else
            echo "❌ coverage-summary.json not found! Check your Jest config."
            exit 1
          fi
