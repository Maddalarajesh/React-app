name: React Coverage Quality Gate

on:
  pull_request:
    branches: [ prod ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      # 1️⃣ AI Review with Updated 2026 Model (Gemini 2.5 Flash)
      - name: AI Code Review (Direct via Gemini)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          git fetch origin prod
          git diff origin/prod > diff.txt
          
          node -e "
          const https = require('https');
          const fs = require('fs');
          const diff = fs.readFileSync('diff.txt', 'utf8');

          if (!diff.trim()) {
            console.log('✅ No changes detected.');
            process.exit(0);
          }

          const postData = JSON.stringify({
            contents: [{
              parts: [{ text: 'Act as a senior developer. Review this git diff for critical bugs or security issues. If it looks good, say OK. If there are issues, start your response with the word ERROR and explain why: \n\n' + diff }]
            }]
          });

          const options = {
            hostname: 'generativelanguage.googleapis.com',
            // Updated to Gemini 2.5 Flash - The 2026 Stable Standard
            path: '/v1/models/gemini-2.5-flash:generateContent?key=' + process.env.GEMINI_API_KEY,
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
          };

          const req = https.request(options, (res) => {
            let body = '';
            res.on('data', (d) => body += d);
            res.on('end', () => {
              try {
                const response = JSON.parse(body);
                if (response.error) {
                  console.error('❌ API Error:', response.error.message);
                  process.exit(1);
                }
                const text = response.candidates[0].content.parts[0].text;
                console.log('--- AI REVIEW RESULT ---');
                console.log(text);
                if (text.toUpperCase().includes('ERROR')) {
                  console.error('❌ AI detected issues!');
                  process.exit(1);
                }
              } catch (e) {
                console.error('❌ Status:', res.statusCode, 'Body:', body);
                process.exit(1);
              }
            });
          });

          req.on('error', (e) => { console.error('❌ Connection Error:', e); process.exit(1); });
          req.write(postData);
          req.end();
          "

      # 2️⃣ Unit Tests & Coverage
      - name: Run unit tests
        run: npm test -- --coverage --watchAll=false --coverageReporters="json-summary"

      # 3️⃣ Enforce 80% Coverage Gate
      - name: Enforce Coverage Gate (80%)
        run: |
          SUMMARY="./coverage/coverage-summary.json"
          if [ -f "$SUMMARY" ]; then
            node -e "
              const summary = require('$SUMMARY');
              const pct = summary.total.lines.pct;
              console.log('📊 Current Coverage: ' + pct + '%');
              if (pct < 80) process.exit(1);
            "
          else
            echo "❌ coverage-summary.json not found!"
            exit 1
          fi
