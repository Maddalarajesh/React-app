name: CI-CD (Advanced Versioning + DockerHub)

permissions:
  contents: write

on:
  push:
    branches:
      - develop
      - beta
      - prod

  workflow_dispatch:
    inputs:
      version:
        description: "Optional: Enter version (e.g., v1.2.3) for rollback"
        required: false

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.set.outputs.branch }}

    steps:
      - uses: actions/checkout@v4

      - id: set
        run: echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT

  # =========================
  # VERSIONING (ONLY DEVELOP)
  # =========================
  versioning:
    needs: setup
    if: needs.setup.outputs.branch == 'develop'
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.tag.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: tag
        run: |
          git fetch --tags

          LAST_TAG=$(git tag --sort=-creatordate | head -n 1)

          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="v1.0.0"
          fi

          VERSION=${LAST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          PATCH=$((PATCH+1))
          NEW_TAG="v$MAJOR.$MINOR.$PATCH"

          echo "Creating version: $NEW_TAG"

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git tag -a $NEW_TAG -m "Release $NEW_TAG"
          git push origin $NEW_TAG

          echo "version=$NEW_TAG" >> $GITHUB_OUTPUT

  # =========================
  # GET VERSION (SMART LOGIC)
  # =========================
  get-version:
    needs: setup
    if: needs.setup.outputs.branch != 'develop' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.get.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show Available Versions
        run: |
          echo "📦 Available Versions:"
          git fetch --tags
          git tag --sort=-creatordate | head -n 10

      - id: get
        run: |
          git fetch --tags

          # 1️⃣ Manual rollback input
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            echo "🔁 Rollback / Manual version selected: $VERSION"

            if ! git rev-parse "$VERSION" >/dev/null 2>&1; then
              echo "❌ ERROR: Tag does not exist"
              exit 1
            fi

          # 2️⃣ Auto detect from commit (best for cherry-pick)
          else
            VERSION=$(git tag --contains HEAD | head -n 1)

            # 3️⃣ Fallback → latest version
            if [ -z "$VERSION" ]; then
              echo "⚠️ No tag found on commit, using latest version"
              VERSION=$(git describe --tags --abbrev=0)
            fi
          fi

          echo "✅ Final Version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  # =========================
  # DEPLOY
  # =========================
  deploy:
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Version
        id: select
        run: |
          if [[ "${{ needs.setup.outputs.branch }}" == "develop" ]]; then
            VERSION="${{ needs.versioning.outputs.version }}"
          else
            VERSION="${{ needs.get-version.outputs.version }}"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Deployment Summary
        run: |
          echo "=================================="
          echo "🚀 Deploying Version: ${{ steps.select.outputs.version }}"
          echo "🌿 Branch: ${{ needs.setup.outputs.branch }}"
          echo "=================================="

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # DEVELOP → BUILD NEW IMAGE
      - name: Build & Push (Develop)
        if: needs.setup.outputs.branch == 'develop'
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/aesthisia-demo
          TAG=${{ steps.select.outputs.version }}

          docker build -t $IMAGE:$TAG .
          docker push $IMAGE:$TAG

      # BETA / PROD → REUSE IMAGE
      - name: Use Existing Image
        if: needs.setup.outputs.branch != 'develop'
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/aesthisia-demo
          TAG=${{ steps.select.outputs.version }}

          echo "✅ Using existing image: $IMAGE:$TAG"
