name: CI-CD (Clean Versioning Flow)

permissions:
  contents: write

on:
  push:
    branches:
      - develop
      - beta
      - prod

  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.set.outputs.branch }}

    steps:
      - uses: actions/checkout@v4

      - id: set
        run: |
          echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT

  # =========================
  # VERSIONING (ONLY DEVELOP)
  # =========================
  versioning:
    needs: setup
    if: needs.setup.outputs.branch == 'develop'
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.tag.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: tag
        run: |
          git fetch --tags

          LAST_TAG=$(git tag --sort=-creatordate | head -n 1)

          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="v1.0.0"
          fi

          VERSION=${LAST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          PATCH=$((PATCH+1))
          NEW_TAG="v$MAJOR.$MINOR.$PATCH"

          echo "Creating version: $NEW_TAG"

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git tag -a $NEW_TAG -m "Release $NEW_TAG"
          git push origin $NEW_TAG

          echo "version=$NEW_TAG" >> $GITHUB_OUTPUT

  # =========================
  # GET VERSION (BETA / PROD)
  # =========================
  get-version:
    needs: setup
    if: needs.setup.outputs.branch != 'develop'
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.get.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: get
        run: |
          git fetch --tags

          VERSION=$(git tag --contains HEAD | head -n 1)

          if [ -z "$VERSION" ]; then
            echo "❌ ERROR: No version tag found for this commit"
            echo "👉 Fix: Ensure commit is tagged in develop"
            exit 1
          fi

          echo "Detected version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  # =========================
  # BUILD / DEPLOY
  # =========================
  deploy:
    needs: [setup, versioning, get-version]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Version
        id: select
        run: |
          if [[ "${{ needs.setup.outputs.branch }}" == "develop" ]]; then
            VERSION="${{ needs.versioning.outputs.version }}"
          else
            VERSION="${{ needs.get-version.outputs.version }}"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Show Version
        run: |
          echo "=================================="
          echo "🚀 Version: ${{ steps.select.outputs.version }}"
          echo "🌿 Branch: ${{ needs.setup.outputs.branch }}"
          echo "=================================="

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build ONLY in develop
      - name: Build & Push (Develop)
        if: needs.setup.outputs.branch == 'develop'
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/app
          TAG=${{ steps.select.outputs.version }}

          docker build -t $IMAGE:$TAG .
          docker push $IMAGE:$TAG

      # Reuse in beta/prod
      - name: Use Existing Image (Beta/Prod)
        if: needs.setup.outputs.branch != 'develop'
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/app
          TAG=${{ steps.select.outputs.version }}

          echo "Using existing image: $IMAGE:$TAG"
