name: CI-CD (Versioning + ECR + EKS)

permissions:
  contents: write

on:
  push:
    branches:
      - develop
      - beta
      - prod
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Select target environment"
        required: true
        default: "develop"
        type: choice
        options:
          - develop
          - beta
          - prod

      release_type:
        description: "Select release type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  # 🚦 GATEKEEPER: Decisions made here based on branch and commit message
  setup:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      env: ${{ steps.check.outputs.env }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - id: check
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "env=$BRANCH" >> $GITHUB_OUTPUT
          
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Manual run on $BRANCH: Proceeding."
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            MESSAGE=$(git log -1 --pretty=%B)
            # 🚫 BLOCK automatic enhancements, ✅ ALLOW others
            if [[ $MESSAGE == *enhancement* ]]; then
              echo "Auto-push enhancement on $BRANCH: Skipping."
              echo "should_run=false" >> $GITHUB_OUTPUT
            else
              echo "Auto-push valid on $BRANCH: Proceeding."
              echo "should_run=true" >> $GITHUB_OUTPUT
            fi
          fi

  versioning:
    needs: setup
    if: needs.setup.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect change type
        id: type
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "type=${{ github.event.inputs.release_type }}" >> $GITHUB_OUTPUT
          else
            MESSAGE=$(git log -1 --pretty=%B)
            if [[ $MESSAGE == *feature* ]]; then echo "type=minor" >> $GITHUB_OUTPUT
            else echo "type=patch" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Calculate & Tag Version
        id: version
        run: |
          git fetch --tags --force
          TAG=$(git tag --sort=-v:refname | head -n 1)
          if [ -z "$TAG" ]; then TAG="v1.0.0"; fi
          
          VERSION=${TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          TYPE=${{ steps.type.outputs.type }}

          if [[ "$TYPE" == "patch" ]]; then PATCH=$((PATCH+1))
          elif [[ "$TYPE" == "minor" ]]; then MINOR=$((MINOR+1)); PATCH=0
          elif [[ "$TYPE" == "major" ]]; then MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0
          fi

          NEW_TAG="v$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW_TAG" >> $GITHUB_OUTPUT
          
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag -a $NEW_TAG -m "Release $NEW_TAG"
          git push origin $NEW_TAG

  build-and-deploy:
    needs: [setup, versioning]
    if: needs.setup.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    environment: 
      name: ${{ needs.setup.outputs.env }} # 🔐 Use Environment protection (Approvals)
    steps:
      - name: Summary
        run: |
          echo "Deploying version ${{ needs.versioning.outputs.version }} to ${{ needs.setup.outputs.env }}"
      
      # Add your AWS ECR Login, Docker Build, and Kubectl Apply steps here...
