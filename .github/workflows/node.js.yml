name: 🚀 CI-CD (Versioning + DockerHub)

permissions:
  contents: write

on:
  push:
    branches:
      - develop
      - beta
      - prod
  workflow_dispatch:
    inputs:
      release_type:
        description: "Select release type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  # =========================
  # 🔍 SETUP
  # =========================
  setup:
    runs-on: ubuntu-latest
    outputs:
      change_type: ${{ steps.detect.outputs.change_type }}
      branch: ${{ steps.detect.outputs.branch }}

    steps:
      - uses: actions/checkout@v4

      - id: detect
        run: |
          BRANCH="${{ github.ref_name }}"
          COMMIT_MSG=$(git log -1 --pretty=%B)

          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

          echo "🔍 Commit message:"
          echo "$COMMIT_MSG"

          # Detect branch type from commit message
          if [[ "$COMMIT_MSG" == *"enhancement/"* ]]; then
            TYPE="major"
          elif [[ "$COMMIT_MSG" == *"feature/"* ]]; then
            TYPE="minor"
          elif [[ "$COMMIT_MSG" == *"bugfix/"* ]] || [[ "$COMMIT_MSG" == *"hotfix/"* ]]; then
            TYPE="patch"
          else
            TYPE="patch"
          fi

          echo "change_type=$TYPE" >> $GITHUB_OUTPUT
          echo "✅ Detected change type: $TYPE"

  # =========================
  # 🔢 VERSIONING
  # =========================
  versioning:
    needs: setup
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.calc.outputs.version }}
      old_version: ${{ steps.calc.outputs.old_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: type
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TYPE="${{ github.event.inputs.release_type }}"
            echo "🔧 Manual override: $TYPE"
          else
            TYPE="${{ needs.setup.outputs.change_type }}"
          fi

          echo "type=$TYPE" >> $GITHUB_OUTPUT

      - id: calc
        run: |
          git fetch --tags --force

          LAST_TAG=$(git tag --sort=-v:refname | head -n 1)

          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="v1.0.0"
          fi

          VERSION=${LAST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          TYPE=${{ steps.type.outputs.type }}

          echo "📌 Previous Version: $LAST_TAG"
          echo "📌 Change Type: $TYPE"

          if [[ "$TYPE" == "patch" ]]; then
            PATCH=$((PATCH+1))
          elif [[ "$TYPE" == "minor" ]]; then
            MINOR=$((MINOR+1))
            PATCH=0
          elif [[ "$TYPE" == "major" ]]; then
            MAJOR=$((MAJOR+1))
            MINOR=0
            PATCH=0
          fi

          NEW_TAG="v$MAJOR.$MINOR.$PATCH"

          echo "old_version=$LAST_TAG" >> $GITHUB_OUTPUT
          echo "version=$NEW_TAG" >> $GITHUB_OUTPUT

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          if ! git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            git tag -a $NEW_TAG -m "Release $NEW_TAG"
            git push origin $NEW_TAG
          fi

  # =========================
  # 🚀 BUILD & PUSH TO DOCKER HUB
  # =========================
  build-and-deploy:
    needs: [setup, versioning]
    runs-on: ubuntu-latest

    steps:
      - name: 📊 Summary
        run: |
          echo "=================================="
          echo "🚀 Deployment Summary"
          echo "Branch: ${{ needs.setup.outputs.branch }}"
          echo "Previous Version: ${{ needs.versioning.outputs.old_version }}"
          echo "New Version: ${{ needs.versioning.outputs.version }}"
          echo "=================================="

      - uses: actions/checkout@v4

      # 🔐 Login
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🐳 Build
      - name: Build Docker Image
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/aesthisia-demo
          TAG=${{ needs.versioning.outputs.version }}

          docker build -t $IMAGE:$TAG .
          docker tag $IMAGE:$TAG $IMAGE:latest

      # 📦 Push
      - name: Push Docker Image
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/aesthisia-demo
          TAG=${{ needs.versioning.outputs.version }}

          docker push $IMAGE:$TAG
          docker push $IMAGE:latest
