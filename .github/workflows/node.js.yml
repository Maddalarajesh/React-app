name: CI-CD (Sprint Versioning + Manual Deploy)

permissions:
  contents: write

on:
  push:
    branches:
      - sprint/*
      - develop

  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        type: choice
        options: [develop, stage, prod]

      version:
        description: "Enter version to deploy (e.g., v1.2.1 or sprint tag)"
        required: true

      release:
        description: "Create FINAL version?"
        required: true
        default: "no"
        type: choice
        options: [yes, no]

jobs:

  setup:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.detect.outputs.branch }}
      is_tag: ${{ steps.detect.outputs.is_tag }}

    steps:
      - uses: actions/checkout@v4

      - id: detect
        run: |
          echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "is_tag=true" >> $GITHUB_OUTPUT
          else
            echo "is_tag=false" >> $GITHUB_OUTPUT
          fi


  # =========================
  # 🚀 VERSIONING ONLY (NO DEPLOY)
  # =========================
  versioning:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: write

    if: |
      needs.setup.outputs.is_tag == 'false' &&
      (
        startsWith(github.ref_name, 'sprint/') ||
        (github.ref_name == 'develop' && github.event.inputs.release == 'yes')
      )

    outputs:
      version: ${{ steps.calc.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: calc
        run: |
          git fetch --tags --force

          LAST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)

          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="v1.0.0"
          fi

          VERSION=${LAST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          BRANCH="${{ github.ref_name }}"

          if [[ "$BRANCH" == sprint/* ]]; then
            PATCH=$((PATCH+1))
            NEW_TAG="v$MAJOR.$MINOR.$PATCH-sprint-$(date +%Y%m%d%H%M)"

          elif [[ "$BRANCH" == "develop" ]]; then
            PATCH=$((PATCH+1))
            NEW_TAG="v$MAJOR.$MINOR.$PATCH"
          fi

          echo "version=$NEW_TAG" >> $GITHUB_OUTPUT

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          if ! git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
            git push origin "$NEW_TAG"
          fi


  # =========================
  # 🎯 MANUAL DEPLOY ONLY
  # =========================
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Validate Input
        run: |
          if [[ -z "${{ github.event.inputs.version }}" ]]; then
            echo "❌ Version is required"
            exit 1
          fi

      - name: Deploy
        run: |
          VERSION="${{ github.event.inputs.version }}"
          ENV="${{ github.event.inputs.environment }}"

          echo "🚀 Deploying $VERSION to $ENV"

          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

          if [[ "$ENV" == "develop" ]]; then
            IMAGE="${{ secrets.DOCKER_USERNAME }}/aesthisia-demo"
          elif [[ "$ENV" == "stage" ]]; then
            IMAGE="${{ secrets.DOCKER_USERNAME }}/stage-test"
          elif [[ "$ENV" == "prod" ]]; then
            IMAGE="${{ secrets.DOCKER_USERNAME }}/prod-test"
          fi

          docker pull $IMAGE:$VERSION || echo "Image will be built if not found"

          docker build -t $IMAGE:$VERSION .
          docker push $IMAGE:$VERSION
