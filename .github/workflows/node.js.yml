name: CI-CD (Versioning + Build + Deploy)

permissions:
  contents: write

on:
  push:
    branches:
      - prod
  workflow_dispatch:
    inputs:
      release_type:
        description: "Select release type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  # =========================
  # 🔹 VERSIONING JOB
  # =========================
  versioning:
    runs-on: ubuntu-latest

    outputs:
      deploy: ${{ steps.set.outputs.deploy }}
      version: ${{ steps.bump.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 🔥 Install dependencies (required for npm version sometimes)
      - name: Install dependencies
        run: npm install

      # 🔥 Decide version bump type
      - name: Set release type
        id: rel
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.release_type }}" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      # 🔥 Bump version
      - name: Bump version
        id: bump
        run: |
          npm version ${{ steps.rel.outputs.type }} -m "Bump version to %s [skip ci]"
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # 🔥 Push commit + tag
      - name: Push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git push origin prod --follow-tags

      # 🔥 Set deploy flag
      - name: Set deploy flag
        id: set
        run: echo "deploy=true" >> $GITHUB_OUTPUT


  # =========================
  # 🔹 BUILD JOB
  # =========================
  build:
    runs-on: ubuntu-latest
    needs: versioning

    # ✅ This was your main issue — now guaranteed TRUE
    if: needs.versioning.outputs.deploy == 'true'

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Test
        run: npm test


  # =========================
  # 🔹 DEPLOY JOB
  # =========================
  deploy:
    runs-on: ubuntu-latest
    needs: [versioning, build]

    # 🔥 GitHub Environment (for approval if configured)
    environment: production

    steps:
      - name: Deploy
        run: |
          echo "🚀 Deploying version ${{ needs.versioning.outputs.version }} to production..."
          # 👉 Add your real deployment commands here
          # Example:
          # docker build -t my-app:${{ needs.versioning.outputs.version }} .
          # docker push ...
