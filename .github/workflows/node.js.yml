name: CI

permissions:
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_type:
        description: "Select release type (for manual runs)"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  versioning:
    runs-on: ubuntu-latest

    outputs:
      deploy: ${{ steps.type.outputs.deploy }}
      version: ${{ steps.version.outputs.version }}

    steps:
      # ✅ FIX 1: Fetch full history (IMPORTANT)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ✅ Detect change type
      - name: Detect change type
        id: type
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Manual run detected"
            TYPE="${{ github.event.inputs.release_type }}"
            echo "type=$TYPE" >> $GITHUB_OUTPUT
            echo "deploy=true" >> $GITHUB_OUTPUT

          else
            MESSAGE=$(git log -1 --pretty=%B)
            echo "Merge message: $MESSAGE"

            if [[ $MESSAGE == *enhancement* ]]; then
              echo "type=major" >> $GITHUB_OUTPUT
              echo "deploy=false" >> $GITHUB_OUTPUT
            elif [[ $MESSAGE == *feature* ]]; then
              echo "type=minor" >> $GITHUB_OUTPUT
              echo "deploy=true" >> $GITHUB_OUTPUT
            elif [[ $MESSAGE == *bugfix* ]] || [[ $MESSAGE == *hotfix* ]]; then
              echo "type=patch" >> $GITHUB_OUTPUT
              echo "deploy=true" >> $GITHUB_OUTPUT
            else
              echo "type=patch" >> $GITHUB_OUTPUT
              echo "deploy=true" >> $GITHUB_OUTPUT
            fi
          fi

      # ✅ FIX 2: Reliable latest tag detection
      - name: Get latest tag
        id: get_tag
        run: |
          git fetch --tags --force

          TAG=$(git tag --sort=-v:refname | head -n 1)

          if [ -z "$TAG" ]; then
            TAG="v1.0.0"
          fi

          echo "Latest tag: $TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      # 🔢 Bump version
      - name: Bump version
        id: version
        run: |
          TAG=${{ steps.get_tag.outputs.tag }}
          VERSION=${TAG#v}

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          TYPE=${{ steps.type.outputs.type }}

          if [[ "$TYPE" == "patch" ]]; then
            PATCH=$((PATCH+1))
          elif [[ "$TYPE" == "minor" ]]; then
            MINOR=$((MINOR+1))
            PATCH=0
          elif [[ "$TYPE" == "major" ]]; then
            MAJOR=$((MAJOR+1))
            MINOR=0
            PATCH=0
          fi

          NEW_VERSION="v$MAJOR.$MINOR.$PATCH"
          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      # ✅ FIX 3: Prevent duplicate tag push issues
      - name: Create Git Tag
        if: steps.type.outputs.deploy == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          TAG=${{ steps.version.outputs.version }}

          if git ls-remote --tags origin | grep -q "refs/tags/$TAG"; then
            echo "Tag already exists in remote, skipping"
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag -a $TAG -m "Release $TAG"
          git push origin $TAG

  build:
    runs-on: ubuntu-latest
    needs: versioning

    # 🚫 Skip enhancement(auto), ✅ allow manual
    if: needs.versioning.outputs.deploy == 'true' || github.event_name == 'workflow_dispatch'

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      # ✅ Also safer to fetch full history here
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci
      - run: npm run build --if-present
      - run: npm test
