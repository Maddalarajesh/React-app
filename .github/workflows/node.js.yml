name: CI

permissions:
  contents: write

on:
  push:
    branches:
      - prod
  workflow_dispatch:
    inputs:
      release_type:
        description: "Select release type (use 'major' for enhancement)"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  versioning:
    # ... (Keep your existing versioning logic here) ...
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.type.outputs.deploy }}
      version: ${{ steps.version.outputs.version }}
    steps:
      # ... (Your existing steps) ...
      - name: Checkout code
        uses: actions/checkout@v4
      # [Rest of your versioning steps...]

  build:
    runs-on: ubuntu-latest
    needs: versioning
    if: needs.versioning.outputs.deploy == 'true'
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build --if-present
      - run: npm test

  # --- NEW DEPLOYMENT JOB WITH APPROVAL ---
  deploy:
    runs-on: ubuntu-latest
    needs: [versioning, build]
    # This links the job to a GitHub Environment
    environment: production 
    steps:
      - name: Deploying to Production
        run: |
          echo "Deploying version ${{ needs.versioning.outputs.version }} to Prod..."
          # Add your actual deployment commands here (e.g., ssh, docker push, s3 sync)
