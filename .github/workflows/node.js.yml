name: CI-CD (Versioning + ECR + EKS)

permissions:
  contents: write

on:
  push:
    branches:
      - develop
      - beta
      - prod
  workflow_dispatch:
    inputs:
      release_type:
        description: "Select release type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  # =========================
  # 🔍 SETUP (Detect Change Type ONLY)
  # =========================
  setup:
    runs-on: ubuntu-latest
    outputs:
      change_type: ${{ steps.check.outputs.change_type }}
      branch: ${{ steps.check.outputs.branch }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - id: check
        run: |
          BRANCH="${{ github.ref_name }}"
          SOURCE_BRANCH="${{ github.head_ref || github.ref_name }}"

          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "Source branch: $SOURCE_BRANCH"

          # 🔍 Detect change type
          if [[ "$SOURCE_BRANCH" == *enhancement* ]]; then
            TYPE="major"
          elif [[ "$SOURCE_BRANCH" == *feature* ]]; then
            TYPE="minor"
          elif [[ "$SOURCE_BRANCH" == *bugfix* ]] || [[ "$SOURCE_BRANCH" == *hotfix* ]]; then
            TYPE="patch"
          else
            TYPE="patch"
          fi

          echo "change_type=$TYPE" >> $GITHUB_OUTPUT

  # =========================
  # 🔢 VERSIONING
  # =========================
  versioning:
    needs: setup
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}
      old_version: ${{ steps.version.outputs.old_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide version type
        id: type
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TYPE="${{ github.event.inputs.release_type }}"
            echo "Manual type: $TYPE"
          else
            TYPE="${{ needs.setup.outputs.change_type }}"
            echo "Auto detected type: $TYPE"
          fi

          echo "type=$TYPE" >> $GITHUB_OUTPUT

      - name: Calculate & Tag Version
        id: version
        run: |
          git fetch --tags --force

          TAG=$(git tag --sort=-v:refname | head -n 1)

          if [ -z "$TAG" ]; then
            TAG="v1.0.0"
          fi

          echo "Previous Version: $TAG"

          VERSION=${TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          TYPE=${{ steps.type.outputs.type }}

          echo "Change Type: $TYPE"

          if [[ "$TYPE" == "patch" ]]; then
            PATCH=$((PATCH+1))
          elif [[ "$TYPE" == "minor" ]]; then
            MINOR=$((MINOR+1))
            PATCH=0
          elif [[ "$TYPE" == "major" ]]; then
            MAJOR=$((MAJOR+1))
            MINOR=0
            PATCH=0
          fi

          NEW_TAG="v$MAJOR.$MINOR.$PATCH"

          echo "New Version: $NEW_TAG"

          echo "old_version=$TAG" >> $GITHUB_OUTPUT
          echo "version=$NEW_TAG" >> $GITHUB_OUTPUT

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "Tag exists, skipping"
          else
            git tag -a $NEW_TAG -m "Release $NEW_TAG"
            git push origin $NEW_TAG
          fi

  # =========================
  # 🚀 BUILD & DEPLOY
  # =========================
  build-and-deploy:
    needs: [setup, versioning]
    runs-on: ubuntu-latest

    steps:
      - name: Summary
        run: |
          echo "Previous Version: ${{ needs.versioning.outputs.old_version }}"
          echo "New Version: ${{ needs.versioning.outputs.version }}"
          echo "Branch: ${{ needs.setup.outputs.branch }}"

      - name: Checkout code
        uses: actions/checkout@v4

      # =========================
      # 🐳 DOCKER BUILD
      # =========================
      - name: Build Docker Image
        run: |
          IMAGE_TAG=${{ needs.versioning.outputs.version }}
          docker build -t my-app:$IMAGE_TAG .

      # =========================
      # 🔐 AWS LOGIN (PLACEHOLDER)
      # =========================
      - name: AWS Login
        run: echo "Login to AWS ECR here"

      # =========================
      # 📦 PUSH TO ECR (PLACEHOLDER)
      # =========================
      - name: Push to ECR
        run: echo "Push Docker image to ECR"

      # =========================
      # ☸️ DEPLOY TO EKS (PLACEHOLDER)
      # =========================
      - name: Deploy to EKS
        run: |
          echo "kubectl apply -f k8s/"
