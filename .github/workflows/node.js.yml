name: CI-CD (Smart Versioning + Auto Final Release)

permissions:
  contents: write

on:
  push:
    branches:
      - sprint/*
      - develop

  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        type: choice
        options: [develop, stage, prod]

      version:
        description: "Enter version to deploy"
        required: true

jobs:

  # =========================
  # 🧠 SETUP
  # =========================
  setup:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.detect.outputs.branch }}

    steps:
      - uses: actions/checkout@v4

      - id: detect
        run: |
          echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT


  # =========================
  # 🚀 VERSIONING
  # =========================
  versioning:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      version: ${{ steps.calc.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: calc
        run: |
          git fetch --tags --force

          LAST_TAG=$(git tag --sort=-v:refname | head -n 1)

          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="v1.0.0"
          fi

          # Remove date suffix if exists
          BASE_VERSION=$(echo $LAST_TAG | cut -d'-' -f1)
          VERSION=${BASE_VERSION#v}

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          BRANCH="${{ github.ref_name }}"

          # =========================
          # 🧠 Detect commit type
          # =========================
          COMMIT_MSG=$(git log -1 --pretty=%B)

          if [[ "$COMMIT_MSG" == *"enhancement/"* ]]; then
            TYPE="major"
          elif [[ "$COMMIT_MSG" == *"feature/"* ]]; then
            TYPE="minor"
          elif [[ "$COMMIT_MSG" == *"hotfix/"* || "$COMMIT_MSG" == *"bugfix/"* || "$COMMIT_MSG" == *"patchfix/"* ]]; then
            TYPE="patch"
          else
            TYPE="patch"
          fi

          echo "Detected TYPE=$TYPE"

          # =========================
          # 🧩 SPRINT VERSIONING
          # =========================
          if [[ "$BRANCH" == sprint/* ]]; then

            if [[ "$TYPE" == "major" ]]; then
              MAJOR=$((MAJOR+1))
              MINOR=0
              PATCH=0
              NEW_TAG="v$MAJOR.$MINOR.$PATCH"

            elif [[ "$TYPE" == "minor" ]]; then
              MINOR=$((MINOR+1))
              PATCH=0
              NEW_TAG="v$MAJOR.$MINOR.$PATCH"

            else
              PATCH=$((PATCH+1))
              NEW_TAG="v$MAJOR.$MINOR.$PATCH"
            fi

          # =========================
          # 🔥 FINAL VERSION (AUTO AFTER MERGE)
          # =========================
          elif [[ "$BRANCH" == "develop" ]]; then

            DATE=$(date +%Y-%m-%d)

            PATCH=$((PATCH+1))
            NEW_TAG="v$MAJOR.$MINOR.$PATCH-$DATE"
          fi

          echo "version=$NEW_TAG" >> $GITHUB_OUTPUT

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          if ! git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
            git push origin "$NEW_TAG"
          fi


  # =========================
  # 🎯 DEPLOY (MANUAL)
  # =========================
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Validate Inputs
        run: |
          if [[ -z "${{ github.event.inputs.version }}" ]]; then
            echo "❌ Version is required"
            exit 1
          fi

      - name: Deploy
        run: |
          VERSION="${{ github.event.inputs.version }}"
          ENV="${{ github.event.inputs.environment }}"

          echo "🚀 Deploying $VERSION to $ENV"

          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

          if [[ "$ENV" == "develop" ]]; then
            IMAGE="${{ secrets.DOCKER_USERNAME }}/aesthisia-demo"
          elif [[ "$ENV" == "stage" ]]; then
            IMAGE="${{ secrets.DOCKER_USERNAME }}/stage-test"
          elif [[ "$ENV" == "prod" ]]; then
            IMAGE="${{ secrets.DOCKER_USERNAME }}/prod-test"
          fi

          docker pull $IMAGE:$VERSION || echo "Building image..."

          docker build -t $IMAGE:$VERSION .
          docker push $IMAGE:$VERSION
