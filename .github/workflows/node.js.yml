name: CI-CD (Clean Versioning + Manual Deploy)

permissions:
  contents: write

on:
  push:
    branches:
      - sprint/*
      - develop

  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        type: choice
        options: [develop, stage, prod]

      version:
        description: "Enter version to deploy (required if release=no)"
        required: false

      release:
        description: "Create FINAL version?"
        required: true
        default: "no"
        type: choice
        options: [yes, no]

      release_type:
        description: "Select release type (for FINAL version)"
        required: false
        default: "patch"
        type: choice
        options: [patch, minor, major]

jobs:

  # =========================
  # 🧠 SETUP
  # =========================
  setup:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.detect.outputs.branch }}
      is_tag: ${{ steps.detect.outputs.is_tag }}
      change_type: ${{ steps.detect.outputs.change_type }}

    steps:
      - uses: actions/checkout@v4

      - id: detect
        run: |
          echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "is_tag=true" >> $GITHUB_OUTPUT
          else
            echo "is_tag=false" >> $GITHUB_OUTPUT
          fi

          COMMIT_MSG=$(git log -1 --pretty=%B)

          if [[ "$COMMIT_MSG" == *"enhancement/"* ]]; then
            TYPE="major"
          elif [[ "$COMMIT_MSG" == *"feature/"* ]]; then
            TYPE="minor"
          else
            TYPE="patch"
          fi

          echo "change_type=$TYPE" >> $GITHUB_OUTPUT


  # =========================
  # 🚀 VERSIONING
  # =========================
  versioning:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: write

    if: |
      needs.setup.outputs.is_tag == 'false' &&
      (
        startsWith(github.ref_name, 'sprint/') ||
        (github.ref_name == 'develop' && github.event.inputs.release == 'yes')
      )

    outputs:
      version: ${{ steps.calc.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: type
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "type=${{ github.event.inputs.release_type }}" >> $GITHUB_OUTPUT
          else
            echo "type=${{ needs.setup.outputs.change_type }}" >> $GITHUB_OUTPUT
          fi

      - id: calc
        run: |
          git fetch --tags --force

          # Get latest version
          LAST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)

          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="v1.0.0"
          fi

          VERSION=${LAST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          BRANCH="${{ github.ref_name }}"
          TYPE=${{ steps.type.outputs.type }}

          # =========================
          # 🧩 SPRINT VERSION (increment patch)
          # =========================
          if [[ "$BRANCH" == sprint/* ]]; then
            PATCH=$((PATCH+1))
            NEW_TAG="v$MAJOR.$MINOR.$PATCH"

          # =========================
          # 🔥 FINAL VERSION (manual)
          # =========================
          elif [[ "$BRANCH" == "develop" && "${{ github.event.inputs.release }}" == "yes" ]]; then
            if [[ "$TYPE" == "patch" ]]; then
              PATCH=$((PATCH+1))
            elif [[ "$TYPE" == "minor" ]]; then
              MINOR=$((MINOR+1))
              PATCH=0
            elif [[ "$TYPE" == "major" ]]; then
              MAJOR=$((MAJOR+1))
              MINOR=0
              PATCH=0
            fi

            NEW_TAG="v$MAJOR.$MINOR.$PATCH"
          fi

          echo "version=$NEW_TAG" >> $GITHUB_OUTPUT

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          if ! git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
            git push origin "$NEW_TAG"
          fi


  # =========================
  # 🎯 MANUAL DEPLOY
  # =========================
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Validate Inputs
        run: |
          if [[ "${{ github.event.inputs.release }}" == "no" && -z "${{ github.event.inputs.version }}" ]]; then
            echo "❌ Version is required when not creating release"
            exit 1
          fi

      - name: Decide Version
        id: decide
        run: |
          if [[ "${{ github.event.inputs.release }}" == "yes" ]]; then
            echo "version=${{ needs.versioning.outputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy
        run: |
          VERSION="${{ steps.decide.outputs.version }}"
          ENV="${{ github.event.inputs.environment }}"

          echo "🚀 Deploying $VERSION to $ENV"

          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

          if [[ "$ENV" == "develop" ]]; then
            IMAGE="${{ secrets.DOCKER_USERNAME }}/aesthisia-demo"
          elif [[ "$ENV" == "stage" ]]; then
            IMAGE="${{ secrets.DOCKER_USERNAME }}/stage-test"
          elif [[ "$ENV" == "prod" ]]; then
            IMAGE="${{ secrets.DOCKER_USERNAME }}/prod-test"
          fi

          docker pull $IMAGE:$VERSION || echo "Building image..."

          docker build -t $IMAGE:$VERSION .
          docker push $IMAGE:$VERSION
