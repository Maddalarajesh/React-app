name: CI-CD (Versioning + DockerHub)

permissions:
  contents: write

on:
  push:
    branches:
      - develop
      - beta
      - prod
  workflow_dispatch:
    inputs:
      release_type:
        description: "Select release type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  # =========================
  # 🔍 SETUP
  # =========================
  setup:
    runs-on: ubuntu-latest
    outputs:
      change_type: ${{ steps.check.outputs.change_type }}
      branch: ${{ steps.check.outputs.branch }}

    steps:
      - uses: actions/checkout@v4

      - id: check
        run: |
          BRANCH="${{ github.ref_name }}"
          SOURCE_BRANCH="${{ github.head_ref || github.ref_name }}"

          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

          if [[ "$SOURCE_BRANCH" == *enhancement* ]]; then
            TYPE="major"
          elif [[ "$SOURCE_BRANCH" == *feature* ]]; then
            TYPE="minor"
          elif [[ "$SOURCE_BRANCH" == *bugfix* ]] || [[ "$SOURCE_BRANCH" == *hotfix* ]]; then
            TYPE="patch"
          else
            TYPE="patch"
          fi

          echo "change_type=$TYPE" >> $GITHUB_OUTPUT

  # =========================
  # 🔢 VERSIONING
  # =========================
  versioning:
    needs: setup
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}
      old_version: ${{ steps.version.outputs.old_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: type
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TYPE="${{ github.event.inputs.release_type }}"
          else
            TYPE="${{ needs.setup.outputs.change_type }}"
          fi
          echo "type=$TYPE" >> $GITHUB_OUTPUT

      - id: version
        run: |
          git fetch --tags --force

          TAG=$(git tag --sort=-v:refname | head -n 1)
          if [ -z "$TAG" ]; then
            TAG="v1.0.0"
          fi

          VERSION=${TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          TYPE=${{ steps.type.outputs.type }}

          if [[ "$TYPE" == "patch" ]]; then
            PATCH=$((PATCH+1))
          elif [[ "$TYPE" == "minor" ]]; then
            MINOR=$((MINOR+1))
            PATCH=0
          elif [[ "$TYPE" == "major" ]]; then
            MAJOR=$((MAJOR+1))
            MINOR=0
            PATCH=0
          fi

          NEW_TAG="v$MAJOR.$MINOR.$PATCH"

          echo "old_version=$TAG" >> $GITHUB_OUTPUT
          echo "version=$NEW_TAG" >> $GITHUB_OUTPUT

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          if ! git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            git tag -a $NEW_TAG -m "Release $NEW_TAG"
            git push origin $NEW_TAG
          fi

  # =========================
  # 🚀 BUILD & PUSH TO DOCKER HUB
  # =========================
  build-and-deploy:
    needs: [setup, versioning]
    runs-on: ubuntu-latest

    steps:
      - name: Summary
        run: |
          echo "Previous Version: ${{ needs.versioning.outputs.old_version }}"
          echo "New Version: ${{ needs.versioning.outputs.version }}"
          echo "Branch: ${{ needs.setup.outputs.branch }}"

      - uses: actions/checkout@v4

      # 🔐 Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🐳 Build Image
      - name: Build Docker Image
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/aesthisia-demo
          TAG=${{ needs.versioning.outputs.version }}

          docker build -t $IMAGE:$TAG .
          docker tag $IMAGE:$TAG $IMAGE:latest

      # 📦 Push Image
      - name: Push Docker Image
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/aesthisia-demo
          TAG=${{ needs.versioning.outputs.version }}

          docker push $IMAGE:$TAG
          docker push $IMAGE:latest
