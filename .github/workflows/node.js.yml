name: CI-CD (Versioning + DockerHub)

permissions:
  contents: write

on:
  push:
    branches:
      - develop
      - beta
      - prod

  workflow_dispatch:
    inputs:
      version:
        description: "Enter version tag (e.g., v1.2.3)"
        required: false

      release_type:
        description: "Select release type (only for develop)"
        required: false
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  # =========================
  # SETUP
  # =========================
  setup:
    runs-on: ubuntu-latest
    outputs:
      change_type: ${{ steps.detect.outputs.change_type }}
      branch: ${{ steps.detect.outputs.branch }}

    steps:
      - uses: actions/checkout@v4

      - id: detect
        run: |
          BRANCH="${{ github.ref_name }}"
          COMMIT_MSG=$(git log -1 --pretty=%B)

          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

          if [[ "$COMMIT_MSG" == *"enhancement/"* ]]; then
            TYPE="major"
          elif [[ "$COMMIT_MSG" == *"feature/"* ]]; then
            TYPE="minor"
          elif [[ "$COMMIT_MSG" == *"bugfix/"* ]] || [[ "$COMMIT_MSG" == *"hotfix/"* ]]; then
            TYPE="patch"
          else
            TYPE="patch"
          fi

          echo "change_type=$TYPE" >> $GITHUB_OUTPUT

  # =========================
  # VERSIONING (ONLY DEVELOP)
  # =========================
  versioning:
    needs: setup
    if: needs.setup.outputs.branch == 'develop'
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.calc.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: type
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.release_type }}" ]]; then
            TYPE="${{ github.event.inputs.release_type }}"
          else
            TYPE="${{ needs.setup.outputs.change_type }}"
          fi

          echo "type=$TYPE" >> $GITHUB_OUTPUT

      - id: calc
        run: |
          git fetch --tags --force

          LAST_TAG=$(git tag --sort=-creatordate | head -n 1)

          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="v1.0.0"
          fi

          VERSION=${LAST_TAG#v}
          BASE_VERSION=$(echo $VERSION | cut -d'-' -f1)

          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"

          TYPE=${{ steps.type.outputs.type }}

          if [[ "$TYPE" == "patch" ]]; then
            PATCH=$((PATCH+1))
            DATE=$(date +%Y-%m-%d)
            NEW_TAG="v$MAJOR.$MINOR.$PATCH-$DATE"

          elif [[ "$TYPE" == "minor" ]]; then
            MINOR=$((MINOR+1))
            PATCH=0
            NEW_TAG="v$MAJOR.$MINOR.$PATCH"

          elif [[ "$TYPE" == "major" ]]; then
            MAJOR=$((MAJOR+1))
            MINOR=0
            PATCH=0
            NEW_TAG="v$MAJOR.$MINOR.$PATCH"
          fi

          echo "version=$NEW_TAG" >> $GITHUB_OUTPUT

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          if ! git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            git tag -a $NEW_TAG -m "Release $NEW_TAG"
            git push origin $NEW_TAG
          fi

  # =========================
  # GET VERSION (BETA / PROD)
  # =========================
  get-version:
    needs: setup
    if: needs.setup.outputs.branch != 'develop'
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.get.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: get
        run: |
          git fetch --tags --force

          # Priority 1: Manual input
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            echo "✅ Manual version selected: $VERSION"

            # Validate tag exists
            if ! git rev-parse "$VERSION" >/dev/null 2>&1; then
              echo "❌ ERROR: Tag $VERSION does not exist"
              exit 1
            fi

          else
            # Priority 2: Detect from commit (cherry-pick safe)
            VERSION=$(git tag --contains HEAD | head -n 1)

            if [ -z "$VERSION" ]; then
              echo "❌ ERROR: No version tag found for this commit"
              echo "👉 Ensure this change was tagged in develop"
              exit 1
            fi

            echo "✅ Detected version from commit: $VERSION"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT

  # =========================
  # BUILD & DEPLOY
  # =========================
  build-and-deploy:
    needs: [setup, versioning, get-version]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Version
        id: select
        run: |
          if [[ "${{ needs.setup.outputs.branch }}" == "develop" ]]; then
            VERSION="${{ needs.versioning.outputs.version }}"
          else
            VERSION="${{ needs.get-version.outputs.version }}"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Deployment Summary
        run: |
          echo "=================================="
          echo "🚀 Deploying Version: ${{ steps.select.outputs.version }}"
          echo "🌿 Branch: ${{ needs.setup.outputs.branch }}"
          echo "=================================="

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # BUILD ONLY IN DEVELOP
      - name: Build Docker Image
        if: needs.setup.outputs.branch == 'develop'
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/aesthisia-demo
          TAG=${{ steps.select.outputs.version }}

          docker build -t $IMAGE:$TAG .
          docker push $IMAGE:$TAG

      # REUSE IMAGE IN BETA / PROD
      - name: Use Existing Image
        if: needs.setup.outputs.branch != 'develop'
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/aesthisia-demo
          TAG=${{ steps.select.outputs.version }}

          echo "✅ Using existing image: $IMAGE:$TAG"
