name: CI

permissions:
  contents: write

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  versioning:
    runs-on: ubuntu-latest

    outputs:
      deploy: ${{ steps.type.outputs.deploy }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔍 Detect change type from merge commit (PR title)
      - name: Detect change type
        id: type
        run: |
          MESSAGE=$(git log -1 --pretty=%B)
          echo "Merge message: $MESSAGE"

          if [[ $MESSAGE == *enhancement* ]]; then
            echo "type=major" >> $GITHUB_OUTPUT
            echo "deploy=false" >> $GITHUB_OUTPUT
          elif [[ $MESSAGE == *feature* ]]; then
            echo "type=minor" >> $GITHUB_OUTPUT
            echo "deploy=true" >> $GITHUB_OUTPUT
          elif [[ $MESSAGE == *bugfix* ]] || [[ $MESSAGE == *hotfix* ]]; then
            echo "type=patch" >> $GITHUB_OUTPUT
            echo "deploy=true" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
            echo "deploy=true" >> $GITHUB_OUTPUT
          fi

      # 🏷️ Get latest tag
      - name: Get latest tag
        id: get_tag
        run: |
          git fetch --tags
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      # 🔢 Bump version
      - name: Bump version
        id: version
        run: |
          TAG=${{ steps.get_tag.outputs.tag }}
          VERSION=${TAG#v}

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          TYPE=${{ steps.type.outputs.type }}

          if [[ "$TYPE" == "patch" ]]; then
            PATCH=$((PATCH+1))
          elif [[ "$TYPE" == "minor" ]]; then
            MINOR=$((MINOR+1))
            PATCH=0
          elif [[ "$TYPE" == "major" ]]; then
            MAJOR=$((MAJOR+1))
            MINOR=0
            PATCH=0
          fi

          NEW_VERSION="v$MAJOR.$MINOR.$PATCH"
          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      # 🔥 Create Git Tag (only for auto OR manual)
      - name: Create Git Tag
        if: steps.type.outputs.deploy == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          TAG=${{ steps.version.outputs.version }}

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists, skipping"
          else
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git tag -a $TAG -m "Release $TAG"
            git push origin $TAG
          fi

  build:
    runs-on: ubuntu-latest
    needs: versioning

    # 🚫 Skip for major unless manual trigger
    if: needs.versioning.outputs.deploy == 'true' || github.event_name == 'workflow_dispatch'

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci
      - run: npm run build --if-present
      - run: npm test