name: CI-CD (Versioning + DockerHub - Promotion Ready)

permissions:
  contents: write

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      tag:
        description: "Enter version tag (e.g., v1.2.3)"
        required: true
      target:
        description: "Select environment"
        required: true
        type: choice
        options: [stage, master]

jobs:

  # 🔹 STEP 1: VERSION + BUILD (ONLY FOR DEVELOP)
  build-dev:
    if: github.ref_name == 'develop'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calc.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate Version
        id: calc
        run: |
          git fetch --tags --force
          LAST_TAG=$(git tag --sort=-v:refname | head -n 1)
          if [ -z "$LAST_TAG" ]; then LAST_TAG="v1.0.0"; fi

          VERSION=${LAST_TAG#v}
          BASE_VERSION=$(echo $VERSION | cut -d'-' -f1)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"

          PATCH=$((PATCH+1))
          NEW_TAG="v$MAJOR.$MINOR.$PATCH-$(date +%Y-%m-%d)"

          echo "version=$NEW_TAG" >> $GITHUB_OUTPUT

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          if ! git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
            git push origin "$NEW_TAG"
          fi

      - name: Build & Push Dev Image
        run: |
          VERSION="${{ steps.calc.outputs.version }}"
          IMAGE="rajeshmaddala/aesthisia-demo"

          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

          docker build -t $IMAGE:$VERSION .
          docker push $IMAGE:$VERSION

  # 🔹 STEP 2: PROMOTION (NO REBUILD)
  promote:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Set Variables
        run: |
          TAG="${{ github.event.inputs.tag }}"
          TARGET="${{ github.event.inputs.target }}"

          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "TARGET=$TARGET" >> $GITHUB_ENV

          if [[ "$TARGET" == "stage" ]]; then
            echo "DEST_IMAGE=rajeshmaddala/stage-test" >> $GITHUB_ENV
          elif [[ "$TARGET" == "master" ]]; then
            echo "DEST_IMAGE=rajeshmaddala/prod-test" >> $GITHUB_ENV
          fi

          echo "SOURCE_IMAGE=rajeshmaddala/aesthisia-demo" >> $GITHUB_ENV

      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Promote Image (No Rebuild 🚀)
        run: |
          echo "Promoting $SOURCE_IMAGE:$TAG → $DEST_IMAGE:$TAG"

          docker pull $SOURCE_IMAGE:$TAG
          docker tag $SOURCE_IMAGE:$TAG $DEST_IMAGE:$TAG
          docker push $DEST_IMAGE:$TAG
