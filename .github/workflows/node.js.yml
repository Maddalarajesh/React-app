name: CI-CD (Tag-Based Promotion)

permissions:
  contents: write

on:
  push:
    branches: [develop, beta, prod]
  workflow_dispatch:
    inputs:
      branch:
        description: "Destination branch (e.g., beta)"
        required: true
        default: "beta"
        type: choice
        options: [develop, beta, prod]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: [actions/checkout](https://github.com)@v4
        with:
          fetch-depth: 0 # Ensures tags are available

      - name: Sync and Promote
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          
          # If you selected a tag in the UI, GITHUB_REF_NAME will be that tag (v1.0.3)
          SOURCE_REF="${{ github.ref_name }}"
          TARGET="${{ inputs.branch }}"
          
          echo "🚀 Promoting $SOURCE_REF to $TARGET"
          
          if [[ "$TARGET" != "develop" ]]; then
            git checkout $TARGET
            # Merges only the code from the selected tag into the target branch
            git merge $SOURCE_REF --no-ff -m "chore: promote $SOURCE_REF to $TARGET"
            git push origin $TARGET
          fi

      - name: Docker Push
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          IMAGE=${{ secrets.DOCKER_USERNAME }}/aesthisia-demo
          TAG="${{ github.ref_name }}"
          
          docker build -t $IMAGE:$TAG .
          docker push $IMAGE:$TAG
